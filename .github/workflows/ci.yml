name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Test
        run: |
          bun test --coverage 2>&1 | tee /tmp/coverage.txt
          pct=$(awk '/All files/ {gsub(/%/,"",$4); print int($4)}' /tmp/coverage.txt)
          echo "Line coverage: ${pct}%"
          if [ "${pct}" -lt 85 ]; then
            echo "Coverage ${pct}% is below the 85% threshold"
            exit 1
          fi
